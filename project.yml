name: Moler
options:
  bundleIdPrefix: dev.niyongsheng.moler
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: Resources/Info.plist
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    SUPPORTED_PLATFORMS: macosx
    TARGETED_DEVICE_FAMILY: 1
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
targets:
  Moler:
    type: application
    platform: macOS
    sources:
      - path: Sources
        type: group
      - path: Resources
        type: group
        createIntermediateGroups: true
      - path: Resources/Assets.xcassets
        buildPhase: resources
        platform: macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.niyongsheng.moler
        PRODUCT_NAME: Moler
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Moler.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: ""
        ENABLE_HARDENED_RUNTIME: NO
    dependencies:
      - sdk: SceneKit.framework
    postCompileScripts:
      - script: |
          if [ "$CONFIGURATION" = "Release" ]; then
            echo "Release build — no debug key injection"
          fi
        name: "Inject Release Keys"
        basedOnDependencyAnalysis: false
  MolerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.niyongsheng.moler.tests
        INFOPLIST_FILE: Resources/Info.plist
    dependencies:
      - target: Moler
