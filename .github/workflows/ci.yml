name: CI

on:
  pull_request:
    branches: [main]
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install xcodegen mole

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Build Release
        run: |
          xcodebuild -project Moler.xcodeproj \
            -scheme Moler \
            -configuration Release \
            -derivedDataPath .build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create DMG
        run: |
          APP=".build/Build/Products/Release/Moler.app"
          DMG="Moler.dmg"
          TMP="dmg_tmp"

          mkdir -p "$TMP"
          cp -R "$APP" "$TMP/"
          ln -s /Applications "$TMP/Applications"

          hdiutil create -volname Moler -srcfolder "$TMP" -ov -format UDZO "$DMG"
          rm -rf "$TMP"

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: Moler.app
          path: .build/Build/Products/Release/Moler.app

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Moler.dmg
          path: Moler.dmg

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Moler.dmg

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Moler.dmg
          generate_release_notes: true
